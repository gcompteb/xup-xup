<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="xup_xup">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>xup_xup</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="loading" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-family:sans-serif;color:#666;font-size:14px;">Carregant...</div>
  <script>
    window.addEventListener("error", function(e) {
      var el = document.getElementById("loading");
      if (el) el.innerHTML = "Error: " + e.message + "<br><br>" + (e.filename || "") + ":" + (e.lineno || "");
    });
    window.addEventListener("unhandledrejection", function(e) {
      var el = document.getElementById("loading");
      if (el) el.innerHTML = "Error: " + (e.reason ? (e.reason.message || e.reason) : "unknown");
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
